<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מידע אישי - אוניברסיטת אריאל</title>
    <style>
        :root {
            --ariel-blue: #002d5a;
            --ariel-light-blue: #005696;
            --bg-gray: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: white;
            padding: 15px 50px;
            border-bottom: 4px solid var(--ariel-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-placeholder {
            color: var(--ariel-blue);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid var(--ariel-light-blue);
        }

        h2 {
            color: var(--ariel-blue);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--ariel-light-blue);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--ariel-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: var(--ariel-light-blue);
        }

        .links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
        }

        .links a {
            color: var(--ariel-light-blue);
            text-decoration: none;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-placeholder">אוניברסיטת אריאל בשומרון</div>
    </div>

    <div class="main-container">
        <div class="login-box">
            <h2>כניסה למערכת המידע האישי</h2>
            <form action="/" method="post">
                <div class="form-group">
                    <label for="student_id">מספר תעודת זהות / דרכון</label>
                    <input type="text" id="student_id" name="student_id" placeholder="הקלד מספר זהות" required>
                </div>
                <div class="form-group">
                    <label for="password">סיסמה</label>
                    <input type="password" id="password" name="password" placeholder="הקלד סיסמה" required>
                </div>
                <button type="submit" class="btn-login" onclick="alert('POC: הנתונים נשלחו לשרת ה-DNS שלך'); return false;">כניסה</button>
            </form>

            <div class="links">
                <a href="#">שכחתי סיסמה</a>
                <span>|</span>
                <a href="#">עזרה והדרכה</a>
            </div>
        </div>
    </div>

    <div class="footer">
        © כל הזכויות שמורות לאוניברסיטת אריאל בשומרון
    </div>

</body>
</html>
